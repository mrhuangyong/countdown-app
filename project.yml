name: CountdownApp
options:
  bundleIdPrefix: com.mrhuangyong
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  CountdownApp:
    type: application
    platform: iOS
    sources:
      - path: CountdownApp
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openclaw.countdown
        INFOPLIST_FILE: CountdownApp/Info.plist
        GENERATE_INFOPLIST_FILE: false
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: true
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_ENTITLEMENTS: CountdownApp/CountdownApp.entitlements
    info:
      path: CountdownApp/Info.plist
      properties:
        CFBundleDevelopmentRegion: zh-Hans
        CFBundleDisplayName: 倒计时
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: $(PRODUCT_BUNDLE_PACKAGE_TYPE)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSRequiresIPhoneOS: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSUserActivityTypes:
          - "CountdownIntent"
        BGTaskSchedulerPermittedIdentifiers: []
        NSSupportsLiveActivities: true

  CountdownWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: CountdownWidget
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openclaw.countdown.widget
        INFOPLIST_FILE: CountdownWidget/Info.plist
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_ENTITLEMENTS: CountdownWidget/CountdownWidget.entitlements
        EXTENSIONKIT_ONLY: false
        SKIP_INSTALL: true
    info:
      path: CountdownWidget/Info.plist
      properties:
        CFBundleDisplayName: 倒计时小组件
        NSSupportsLiveActivities: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
